services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}         # Usuário do banco
      POSTGRES_PASSWORD: ${DB_PASSWORD} # Senha do banco
      POSTGRES_DB: ${POSTGRES_DB}       # Nome do banco inicial
    ports:
      - "5432:5432"                 # Porta local:porta do container
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data  # Persistência dos dados

volumes:
  db_data:
    driver: local
